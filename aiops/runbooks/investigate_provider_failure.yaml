id: investigate_provider_failure
name: Investigate Provider or Worker Failure
risk: medium
approval_required: true
description: Investigate queue backlog caused by worker failures or external notification/video provider issues.
steps:
  - Check queue backlog.
  - Check worker metrics.
  - Check provider timeout/error logs.
  - Pause unsafe retries if needed.
  - Route to fallback provider if configured.
verification_steps:
  - Queue backlog decreases.
  - Worker processed count increases.
  - Dead-letter events stop increasing.


# In production, this could map to:

# Azure Service Bus queue depth.
# Twilio/SendGrid/provider API status.
# Dead-letter queue inspection.
# Retry policy validation.
# Circuit breaker check.