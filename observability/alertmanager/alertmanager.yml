global:
  resolve_timeout: 30s

route:
  receiver: aiops-webhook
  group_by:
    - alertname
    - service
  group_wait: 2s
  group_interval: 10s
  repeat_interval: 2m

receivers:
  - name: aiops-webhook
    webhook_configs:
      - url: http://aiops:8010/incidents/from-alert
        send_resolved: true
