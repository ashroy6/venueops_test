global:
  scrape_interval: 5s
  evaluation_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

rule_files:
  - /etc/prometheus/rules/*.yaml

scrape_configs:
  - job_name: "venueops-api"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "api:8000"

  - job_name: "venueops-ingestion-api"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "ingestion-api:8001"

  - job_name: "venueops-log-processor"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "log-processor:9101"

  - job_name: "venueops-video-processor"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "video-processor:9102"

  - job_name: "venueops-notification-worker"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "notification-worker:9103"

  - job_name: "venueops-aiops"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "aiops:8010"
