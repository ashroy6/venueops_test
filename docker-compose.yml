services:
  web:
    build:
      context: ./apps/web
    ports:
      - "3000:8080"
    depends_on:
      - api
      - ingestion-api
      - aiops
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      LOG_LEVEL: INFO
      MESSAGE_MODE: local
      DATABASE_MODE: sqlite
      DATABASE_URL: sqlite:////data/db/venueops.db
      DATA_DIR: /data
      MOCK_SERVICEBUS_QUEUE: /data/queues/jobs.jsonl
      AUDIT_LOG_PATH: /data/audit/audit.jsonl
    volumes:
      - venueops_data:/data
    restart: unless-stopped

  ingestion-api:
    build:
      context: ./apps/ingestion-api
    ports:
      - "8001:8001"
    environment:
      APP_ENV: local
      LOG_LEVEL: INFO
      MESSAGE_MODE: local
      DATABASE_MODE: sqlite
      DATABASE_URL: sqlite:////data/db/venueops.db
      DATA_DIR: /data
      MOCK_EVENTHUB_QUEUE: /data/queues/device_logs.jsonl
    volumes:
      - venueops_data:/data
    restart: unless-stopped

  log-processor:
    build:
      context: ./apps/workers/log-processor
    ports:
      - "9101:9101"
    environment:
      APP_ENV: local
      LOG_LEVEL: INFO
      MESSAGE_MODE: local
      MOCK_EVENTHUB_QUEUE: /data/queues/device_logs.jsonl
      PROCESSED_LOG_PATH: /data/processed/processed_device_logs.jsonl
      METRICS_PORT: 9101
    volumes:
      - venueops_data:/data
    depends_on:
      - ingestion-api
    restart: unless-stopped

  video-processor:
    build:
      context: ./apps/workers/video-processor
    ports:
      - "9102:9102"
    environment:
      APP_ENV: local
      LOG_LEVEL: INFO
      MESSAGE_MODE: local
      MOCK_SERVICEBUS_QUEUE: /data/queues/jobs.jsonl
      VIDEO_OUTPUT_PATH: /data/processed/video_jobs.jsonl
      METRICS_PORT: 9102
    volumes:
      - venueops_data:/data
    depends_on:
      - api
    restart: unless-stopped

  notification-worker:
    build:
      context: ./apps/workers/notification-worker
    ports:
      - "9103:9103"
    environment:
      APP_ENV: local
      LOG_LEVEL: INFO
      MESSAGE_MODE: local
      MOCK_SERVICEBUS_QUEUE: /data/queues/jobs.jsonl
      NOTIFICATION_OUTPUT_PATH: /data/processed/notification_jobs.jsonl
      METRICS_PORT: 9103
    volumes:
      - venueops_data:/data
    depends_on:
      - api
    restart: unless-stopped

  aiops:
    build:
      context: ./aiops
    ports:
      - "8010:8010"
    environment:
      APP_ENV: local
      LOG_LEVEL: INFO
      API_BASE_URL: http://api:8000
      INGESTION_BASE_URL: http://ingestion-api:8001
      PROMETHEUS_BASE_URL: http://prometheus:9090
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2:1b
      DATA_DIR: /data
      AIOPS_AUDIT_LOG_PATH: /data/audit/aiops_audit.jsonl
      RUNBOOK_DIR: /app/runbooks
    volumes:
      - venueops_data:/data
    depends_on:
      - api
      - ingestion-api
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    depends_on:
      - aiops
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.0.1
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    depends_on:
      - api
      - ingestion-api
      - log-processor
      - video-processor
      - notification-worker
      - aiops
      - alertmanager
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  venueops_data:
  prometheus_data:
  grafana_data:
  ollama_data:
