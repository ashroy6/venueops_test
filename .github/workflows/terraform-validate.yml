name: Terraform Validate

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform-validate.yml"
  push:
    branches:
      - main
      - dev
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform-validate.yml"

permissions:
  contents: read

jobs:
  terraform-validate:
    name: Terraform fmt/init/validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform fmt check
        run: |
          terraform fmt -recursive -check

      - name: Terraform init without backend
        run: |
          terraform init -backend=false

      - name: Terraform validate
        run: |
          terraform validate

      - name: Save validate evidence
        if: always()
        run: |
          mkdir -p ../../docs/evidence
          {
            echo "# Terraform CI Evidence"
            echo ""
            date -u
            echo ""
            terraform validate
          } > ../../docs/evidence/terraform-ci-validate.txt

      - name: Upload Terraform evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-evidence
          path: docs/evidence/terraform-ci-validate.txt
