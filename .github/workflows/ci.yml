name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-compose-smoke-test:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      COMPOSE_PROJECT_NAME: venueops-ci-${{ github.run_id }}
      COMPOSE_PARALLEL_LIMIT: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version
          echo "COMPOSE_PROJECT_NAME=$COMPOSE_PROJECT_NAME"

      - name: Clean previous Docker state
        run: |
          docker compose down -v --remove-orphans || true
          docker volume rm "${COMPOSE_PROJECT_NAME}_venueops_data" || true
          docker volume rm "${COMPOSE_PROJECT_NAME}_prometheus_data" || true
          docker volume rm "${COMPOSE_PROJECT_NAME}_grafana_data" || true
          docker volume prune -f || true
          docker system df || true

      - name: Pre-create named volumes and data directories
        run: |
          docker volume create "${COMPOSE_PROJECT_NAME}_venueops_data"
          docker volume create "${COMPOSE_PROJECT_NAME}_prometheus_data"
          docker volume create "${COMPOSE_PROJECT_NAME}_grafana_data"

          docker run --rm \
            -v "${COMPOSE_PROJECT_NAME}_venueops_data:/data" \
            alpine:3.20 \
            sh -c '
              mkdir -p /data/queues /data/processed /data/audit /data/db
              touch /data/queues/device_logs.jsonl
              touch /data/queues/jobs.jsonl
              ls -la /data
            '

      - name: Build local services
        run: |
          docker compose build --no-cache

      - name: Start local platform
        run: |
          docker compose up -d --force-recreate --renew-anon-volumes
          docker compose ps

      - name: Wait for services to become healthy
        run: |
          echo "Waiting for web dashboard..."
          for i in {1..60}; do
            if curl -fsS http://localhost:3000/health.html >/dev/null; then
              echo "web is ready"
              break
            fi
            echo "web not ready yet... attempt $i"
            sleep 2
          done

          echo "Waiting for backend API..."
          for i in {1..60}; do
            if curl -fsS http://localhost:8000/health >/dev/null; then
              echo "backend API is ready"
              break
            fi
            echo "backend API not ready yet... attempt $i"
            docker compose ps || true
            sleep 2
          done

          echo "Waiting for ingestion API..."
          for i in {1..60}; do
            if curl -fsS http://localhost:8001/health >/dev/null; then
              echo "ingestion API is ready"
              break
            fi
            echo "ingestion API not ready yet... attempt $i"
            docker compose ps || true
            sleep 2
          done

          echo "Final service status:"
          docker compose ps

          echo "Final health checks:"
          curl -fsS http://localhost:3000/health.html
          curl -fsS http://localhost:8000/health
          curl -fsS http://localhost:8001/health

      - name: Run smoke test
        run: |
          bash scripts/smoke-test.sh

      - name: Check observability endpoints
        run: |
          curl -sS http://localhost:8000/metrics | grep venueops_api
          curl -sS http://localhost:8001/metrics | grep venueops_ingestion
          curl -sS "http://localhost:9090/api/v1/query?query=up" | grep venueops-api

      - name: Generate evidence
        if: always()
        run: |
          bash scripts/generate-evidence.sh || true

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence
          path: docs/evidence/

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs --tail=300 || true
          docker volume ls || true
          docker run --rm -v "${COMPOSE_PROJECT_NAME}_venueops_data:/data" alpine:3.20 sh -c "find /data -maxdepth 3 -print -exec ls -ld {} \;" || true

      - name: Stop local platform
        if: always()
        run: |
          docker compose down -v --remove-orphans || true
