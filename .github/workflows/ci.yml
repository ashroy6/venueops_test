name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-compose-smoke-test:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      COMPOSE_PROJECT_NAME: venueops-ci-${{ github.run_id }}
      COMPOSE_PARALLEL_LIMIT: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version
          echo "COMPOSE_PROJECT_NAME=$COMPOSE_PROJECT_NAME"

      - name: Clean previous Docker state
        run: |
          docker compose down -v --remove-orphans || true
          docker volume rm "${COMPOSE_PROJECT_NAME}_venueops_data" || true
          docker volume rm "${COMPOSE_PROJECT_NAME}_prometheus_data" || true
          docker volume rm "${COMPOSE_PROJECT_NAME}_grafana_data" || true
          docker volume prune -f || true
          docker system df || true

      - name: Pre-create named volumes and data directories
        run: |
          docker volume create "${COMPOSE_PROJECT_NAME}_venueops_data"
          docker volume create "${COMPOSE_PROJECT_NAME}_prometheus_data"
          docker volume create "${COMPOSE_PROJECT_NAME}_grafana_data"

          docker run --rm \
            -v "${COMPOSE_PROJECT_NAME}_venueops_data:/data" \
            alpine:3.20 \
            sh -c '
              mkdir -p /data/queues /data/processed /data/audit /data/db
              touch /data/queues/device_logs.jsonl
              touch /data/queues/jobs.jsonl
              ls -la /data
            '

      - name: Build local services
        run: |
          docker compose build --no-cache

      - name: Start local platform
        run: |
          docker compose up -d --force-recreate --renew-anon-volumes
          docker compose ps

      - name: Wait for services
        run: |
          wait_for_url() {
            local name="$1"
            local url="$2"
            local attempts="${3:-90}"

            echo "Waiting for $name at $url"

            for i in $(seq 1 "$attempts"); do
              if curl -fsS "$url" >/dev/null 2>&1; then
                echo "PASSED: $name is ready"
                return 0
              fi

              echo "$name not ready yet... attempt $i/$attempts"
              docker compose ps || true
              sleep 2
            done

            echo "FAILED: $name did not become ready"
            docker compose ps || true
            docker compose logs --tail=200 api || true
            docker compose logs --tail=200 ingestion-api || true
            docker compose logs --tail=200 web || true
            exit 1
          }

          wait_for_url "web dashboard" "http://127.0.0.1:3000/health.html" 90
          wait_for_url "backend API" "http://127.0.0.1:8000/health" 90
          wait_for_url "ingestion API" "http://127.0.0.1:8001/health" 90
          wait_for_url "Prometheus" "http://127.0.0.1:9090/-/ready" 90

          echo "Final service status:"
          docker compose ps

      - name: Run smoke test
        run: |
          bash scripts/smoke-test.sh

      - name: Check observability endpoints
        run: |
          wait_for_metric() {
            local name="$1"
            local command="$2"
            local attempts="${3:-60}"

            echo "Waiting for metric: $name"

            for i in $(seq 1 "$attempts"); do
              if bash -c "$command"; then
                echo "PASSED: $name"
                return 0
              fi

              echo "$name not ready yet... attempt $i/$attempts"
              sleep 2
            done

            echo "FAILED: $name did not become available"
            docker compose ps || true
            docker compose logs --tail=200 prometheus || true
            exit 1
          }

          wait_for_metric "backend API metrics" \
            "curl -fsS http://127.0.0.1:8000/metrics | grep venueops_api" 60

          wait_for_metric "ingestion API metrics" \
            "curl -fsS http://127.0.0.1:8001/metrics | grep venueops_ingestion" 60

          wait_for_metric "Prometheus target query" \
            "curl -fsS 'http://127.0.0.1:9090/api/v1/query?query=up' | grep venueops-api" 60

      - name: Generate evidence
        if: always()
        run: |
          bash scripts/generate-evidence.sh || true

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence
          path: docs/evidence/

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs --tail=300 || true
          docker volume ls || true
          docker run --rm -v "${COMPOSE_PROJECT_NAME}_venueops_data:/data" alpine:3.20 sh -c "find /data -maxdepth 3 -print -exec ls -ld {} \;" || true

      - name: Stop local platform
        if: always()
        run: |
          docker compose down -v --remove-orphans || true
