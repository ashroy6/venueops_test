name: Evidence Pack

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths:
      - "README.md"
      - "docs/**"
      - "infra/**"
      - ".github/workflows/**"
      - "scripts/**"
      - "observability/**"

permissions:
  contents: read

jobs:
  evidence-pack:
    name: Build evidence pack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install zip
        run: |
          sudo apt-get update
          sudo apt-get install -y zip tree

      - name: Build evidence pack
        run: |
          bash scripts/build-evidence-pack.sh

      - name: Upload evidence pack
        uses: actions/upload-artifact@v4
        with:
          name: venueops-evidence-pack
          path: dist/*
