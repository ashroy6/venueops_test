apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: venueops-keyvault-secrets
  namespace: venueops
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "${AZURE_WORKLOAD_IDENTITY_CLIENT_ID}"
    keyvaultName: "${AZURE_KEYVAULT_NAME}"
    tenantId: "${AZURE_TENANT_ID}"
    objects: |
      array:
        - |
          objectName: applicationinsights-connection-string
          objectType: secret
        - |
          objectName: database-url
          objectType: secret
        - |
          objectName: sms-provider-api-key
          objectType: secret
        - |
          objectName: email-provider-api-key
          objectType: secret
  secretObjects:
    - secretName: venueops-runtime-secrets
      type: Opaque
      data:
        - objectName: applicationinsights-connection-string
          key: APPLICATIONINSIGHTS_CONNECTION_STRING
        - objectName: database-url
          key: DATABASE_URL
        - objectName: sms-provider-api-key
          key: SMS_PROVIDER_API_KEY
        - objectName: email-provider-api-key
          key: EMAIL_PROVIDER_API_KEY
