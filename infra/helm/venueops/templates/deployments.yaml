{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: venueops-{{ $name | kebabcase }}
  labels:
    app.kubernetes.io/name: venueops
    app.kubernetes.io/component: {{ $name | kebabcase }}
    app.kubernetes.io/part-of: venueops-platform
spec:
  replicas: {{ $svc.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: venueops
      app.kubernetes.io/component: {{ $name | kebabcase }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: venueops
        app.kubernetes.io/component: {{ $name | kebabcase }}
        app.kubernetes.io/part-of: venueops-platform
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: venueops-workload
      {{- if $.Values.global.keyVault.enabled }}
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: venueops-keyvault-secrets
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ $name | kebabcase }}
          image: "{{ $.Values.global.imageRegistry }}/{{ $svc.image.repository }}:{{ $.Values.global.imageTag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          envFrom:
            - configMapRef:
                name: venueops-config
            {{- if $.Values.global.keyVault.enabled }}
            - secretRef:
                name: venueops-runtime-secrets
            {{- end }}
          {{- if ne $svc.kind "worker" }}
          ports:
            - name: http
              containerPort: {{ $svc.containerPort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: {{ $svc.healthPath | quote }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: {{ $svc.healthPath | quote }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          {{- end }}
          {{- if $.Values.global.keyVault.enabled }}
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
---
{{- end }}
{{- end }}
