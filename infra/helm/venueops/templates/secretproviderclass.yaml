{{- if .Values.global.keyVault.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: venueops-keyvault-secrets
  labels:
    {{- include "venueops.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.global.workloadIdentity.clientId | quote }}
    keyvaultName: {{ .Values.global.config.keyVaultName | quote }}
    tenantId: {{ .Values.global.tenantId | quote }}
    objects: |
      array:
        - |
          objectName: applicationinsights-connection-string
          objectType: secret
        - |
          objectName: database-url
          objectType: secret
        - |
          objectName: sms-provider-api-key
          objectType: secret
        - |
          objectName: email-provider-api-key
          objectType: secret
  secretObjects:
    - secretName: venueops-runtime-secrets
      type: Opaque
      data:
        - objectName: applicationinsights-connection-string
          key: APPLICATIONINSIGHTS_CONNECTION_STRING
        - objectName: database-url
          key: DATABASE_URL
        - objectName: sms-provider-api-key
          key: SMS_PROVIDER_API_KEY
        - objectName: email-provider-api-key
          key: EMAIL_PROVIDER_API_KEY
{{- end }}
