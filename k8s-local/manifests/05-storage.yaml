apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: venueops-local-storage
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: venueops-local-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: venueops-local-storage
  local:
    path: /opt/venueops/data
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - kl-worker-1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: venueops-data-pvc
  namespace: venueops
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: venueops-local-storage
  resources:
    requests:
      storage: 2Gi
